name: Centaur Technical Indicators Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  policy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: AI Policy Check
      run: bash "${{ github.workspace }}/.github/scripts/ai_policy_check.sh"

  quality-gates:
    permissions:
      contents: read
    needs: policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: rustup update stable && rustup default stable
    - name: Cargo fmt check
      run: cargo fmt --all -- --check
    - name: Cargo clippy (all targets, all features, deny warnings)
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Cargo test (all features)
      run: cargo test --all-features
    - name: Cargo doc (no deps)
      run: cargo doc --no-deps

  build:
    permissions:
      contents: read
    needs: quality-gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (${{ matrix.toolchain }})
      run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose
