name: Centaur Technical Indicators Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
    - uses: actions/checkout@v4
    - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose
    - name: Verify generated API index is current
      run: |
        python3 scripts/generate_api_index.py
        git diff --exit-code -- docs/api_index.json docs/api_index.md
