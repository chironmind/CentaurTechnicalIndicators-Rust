name: Centaur Technical Indicators CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    # Trigger for PRs against any base branch (supports stacked PR workflows).

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  policy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: AI Policy Check
      run: bash "${{ github.workspace }}/.github/scripts/ai_policy_check.sh"

  fmt:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable + rustfmt)
      run: |
        rustup update stable
        rustup default stable
        rustup component add rustfmt
    - name: Cargo fmt check
      run: cargo fmt --all -- --check

  clippy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable + clippy)
      run: |
        rustup update stable
        rustup default stable
        rustup component add clippy
    - name: Cargo clippy (all targets, deny warnings)
      run: cargo clippy --all-targets -- -D warnings

  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: |
        rustup update stable
        rustup default stable
    - name: Cargo test
      run: cargo test

  doc:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: |
        rustup update stable
        rustup default stable
    - name: Cargo doc (no deps)
      run: cargo doc --no-deps

  msrv:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (MSRV 1.81)
      run: |
        rustup toolchain install 1.81 --profile minimal
        rustup default 1.81
    - name: Cargo build (MSRV, library only)
      run: cargo build
    - name: Cargo test --no-run (MSRV, exercises dev-deps)
      run: cargo test --no-run

  audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: |
        rustup update stable
        rustup default stable
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked
    - name: Generate Cargo.lock
      run: cargo generate-lockfile
    - name: Run cargo audit
      run: cargo audit

  build-matrix:
    permissions:
      contents: read
    needs:
      - policy
      - fmt
      - clippy
      - test
      - doc
      - msrv
      - audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - beta
          - nightly
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (${{ matrix.toolchain }})
      run: |
        rustup update ${{ matrix.toolchain }}
        rustup default ${{ matrix.toolchain }}
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose
