name: Centaur Technical Indicators CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  policy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: AI Policy Check
      run: bash "${{ github.workspace }}/.github/scripts/ai_policy_check.sh"
    - name: Indicator registry schema validation
      run: python3 "${{ github.workspace }}/.github/scripts/validate_indicator_registry.py"

  fmt:
    permissions:
      contents: read
    needs: policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable + rustfmt)
      run: |
        rustup update stable
        rustup default stable
        rustup component add rustfmt
    - name: Cargo fmt check
      run: cargo fmt --all -- --check

  clippy:
    permissions:
      contents: read
    needs: policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable + clippy)
      run: |
        rustup update stable
        rustup default stable
        rustup component add clippy
    - name: Cargo clippy (all targets, all features, deny warnings)
      run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    permissions:
      contents: read
    needs: policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: |
        rustup update stable
        rustup default stable
    - name: Cargo test (all features)
      run: cargo test --all-features

  doc:
    permissions:
      contents: read
    needs: policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (stable)
      run: |
        rustup update stable
        rustup default stable
    - name: Cargo doc (no deps)
      run: cargo doc --no-deps

  build-matrix:
    permissions:
      contents: read
    needs:
      - fmt
      - clippy
      - test
      - doc
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
    - uses: actions/checkout@v4
    - name: Set Rust toolchain (${{ matrix.toolchain }})
      run: |
        rustup update ${{ matrix.toolchain }}
        rustup default ${{ matrix.toolchain }}
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose

  build:
    permissions:
      contents: read
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
    - name: All builds passed
      run: echo "All matrix builds passed"
